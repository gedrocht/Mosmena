name: Feature request
description: Suggest a new feature, workflow, or documentation improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the behavior you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives_considered
    attributes:
      label: Alternatives considered
      description: Which alternative ideas did you evaluate?
