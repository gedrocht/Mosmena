name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate repository structure
        shell: pwsh
        run: ./scripts/ci/assert-repo.ps1

  static-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ""

      - name: Install Android SDK packages
        shell: bash
        run: |
          (yes || true) | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run static analysis
        run: ./gradlew detekt ktlintCheck lintDebug :app:dokkaGeneratePublicationHtml --stacktrace --no-daemon --no-configuration-cache

      - name: Upload Detekt SARIF
        if: ${{ hashFiles('**/build/reports/detekt/*.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/detekt/detekt.sarif

      - name: Upload Android Lint SARIF
        if: ${{ hashFiles('**/build/reports/lint-results-*.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/lint-results-debug.sarif

      - name: Upload static analysis artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: static-analysis-reports
          if-no-files-found: ignore
          path: |
            app/build/reports
            build/reports

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ""

      - name: Install Android SDK packages
        shell: bash
        run: |
          (yes || true) | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests and verify coverage
        run: ./gradlew testDebugUnitTest koverXmlReport koverVerify --stacktrace --no-daemon --no-configuration-cache

      - name: Upload unit test and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-and-coverage-reports
          if-no-files-found: ignore
          path: |
            app/build/reports/tests
            app/build/test-results
            app/build/reports/kover
            build/reports/kover

  documentation-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ""

      - name: Install Android SDK packages
        shell: bash
        run: |
          (yes || true) | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install documentation tools
        run: python -m pip install mkdocs==1.6.1 mkdocs-material==9.5.34

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build docs and API reference
        shell: bash
        run: |
          ./gradlew :app:dokkaGeneratePublicationHtml --stacktrace --no-daemon --no-configuration-cache
          mkdocs build --strict

  instrumentation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_7
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace --no-daemon --no-configuration-cache

      - name: Upload instrumentation test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: instrumentation-test-reports
          if-no-files-found: ignore
          path: |
            app/build/reports
            app/build/outputs/androidTest-results
            app/build/outputs/connected_android_test_additional_output
            app/build/outputs/logs
