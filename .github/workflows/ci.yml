name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository policy files
        shell: pwsh
        run: ./scripts/ci/assert-repo.ps1

  lint-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Super-linter
        uses: super-linter/super-linter/slim@v7
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_MARKDOWN: true
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_POWERSHELL: true
          FILTER_REGEX_EXCLUDE: .*\.git/.*

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Node.js dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: npm ci

      - name: Run Node.js tests with coverage
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test -- --coverage

      - name: Setup Python
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt') != '' }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
          pip install pytest pytest-cov

      - name: Run Python tests with coverage
        if: ${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt') != '' }}
        run: pytest --maxfail=1 --disable-warnings --cov=. --cov-report=xml --cov-report=term-missing

      - name: Ensure at least one test target exists
        if: ${{ hashFiles('package.json', 'pyproject.toml', 'requirements.txt', 'requirements-dev.txt') == '' }}
        run: |
          echo "No supported project manifest found for test execution."
          echo "Add stack-specific test commands to .github/workflows/ci.yml."
          exit 1

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage.xml') != '' }}
        uses: codecov/codecov-action@v4
        with:
          use_oidc: true
          fail_ci_if_error: true
